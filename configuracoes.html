<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configurações - Sou Fitness</title>
    <link rel="stylesheet" href="alunos.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      .container { display: flex; min-height: 100vh; }
      #menu { width: 260px; background: #111; min-height: 100vh; }
      main { flex: 1; padding: 30px; background: var(--bg); overflow-y: auto; color: white; }
      .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
      .form-group { margin-bottom: 15px; }
      .btn-acao { padding: 10px; border-radius: 8px; cursor: pointer; border: none; font-weight: 600; width: 100%; margin-top: 10px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="menu"></div>
      <main>
        <header>
          <h1>Configurações do Sistema</h1>
          <p>Gerencie seus planos de mensalidade e dados de recebimento PIX.</p>
        </header>

        <div class="config-grid">
          <!-- Configuração PIX -->
          <div class="card">
            <h2>🔑 Dados de Recebimento PIX</h2>
            <div class="form-group">
              <label>Chave PIX (CPF, E-mail ou Celular)</label>
              <input type="text" id="cfg_pix_chave" placeholder="Sua chave aqui">
            </div>
            <div class="form-group">
              <label>Nome do Beneficiário</label>
              <input type="text" id="cfg_pix_nome" placeholder="Nome Completo">
            </div>
            <div class="form-group">
              <label>Cidade</label>
              <input type="text" id="cfg_pix_cidade" placeholder="Ex: SAO PAULO">
            </div>
            <button onclick="salvarConfigPix()" class="btn-salvar btn-acao">Salvar Dados PIX</button>
          </div>

          <!-- Gestão de Planos -->
          <div class="card">
            <h2>🏋️ Gestão de Planos</h2>
            <form id="formPlano">
              <div class="form-group">
                <label>Nome do Plano</label>
                <input type="text" id="plano_nome" required placeholder="Ex: Musculação Premium">
              </div>
              <div class="form-group">
                <label>Valor Mensal (R$)</label>
                <input type="text" id="plano_valor" required placeholder="R$ 0,00">
              </div>
              <button type="submit" class="btn-salvar btn-acao">Adicionar/Atualizar Plano</button>
            </form>
            
            <table style="margin-top: 20px; font-size: 14px;">
              <thead>
                <tr><th>Plano</th><th>Valor</th><th>Ação</th></tr>
              </thead>
              <tbody id="tabelaConfigPlanos"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script src="script.js"></script>
    <script>
      fetch("menu.html").then(res => res.text()).then(html => document.getElementById("menu").innerHTML = html);

      // Carrega os dados salvos ao abrir
      document.addEventListener('DOMContentLoaded', () => {
        const config = JSON.parse(localStorage.getItem('config_pix')) || {};
        document.getElementById('cfg_pix_chave').value = config.chave || '';
        document.getElementById('cfg_pix_nome').value = config.nome || '';
        document.getElementById('cfg_pix_cidade').value = config.cidade || '';
        carregarTabelaPlanosConfig();
      });

      let editPlanoId = null; // Variável para controlar o modo de edição

      // Lógica para Salvar ou Atualizar Plano
      document.getElementById('formPlano').addEventListener('submit', (e) => {
        e.preventDefault();
        const nome = document.getElementById('plano_nome').value;
        const valorRaw = document.getElementById('plano_valor').value;
        const valor = parseFloat(valorRaw.replace('R$', '').replace(/\./g, '').replace(',', '.').replace(/\s/g, '').trim()) || 0;

        let planos = JSON.parse(localStorage.getItem('planos')) || [];
        
        if (editPlanoId) {
          // Modo Edição: Localiza e atualiza o plano existente
          const index = planos.findIndex(p => p.id == editPlanoId);
          if (index !== -1) {
            planos[index] = { ...planos[index], nome, valor };
          }
          editPlanoId = null;
          document.querySelector('#formPlano button[type="submit"]').innerText = 'Adicionar/Atualizar Plano';
          alert('Plano atualizado com sucesso!');
        } else {
          // Modo Cadastro: Adiciona um novo plano
          planos.push({ id: Date.now(), nome, valor });
          alert('Plano salvo com sucesso!');
        }
        
        localStorage.setItem('planos', JSON.stringify(planos));
        document.getElementById('formPlano').reset();
        carregarTabelaPlanosConfig();
        
        // Atualiza a lista global no script.js para que o cadastro de alunos reflita a mudança
        if (typeof window.inicializarPlanos === 'function') window.inicializarPlanos();
      });

      window.salvarConfigPix = () => {
        const config = {
          chave: document.getElementById('cfg_pix_chave').value,
          nome: document.getElementById('cfg_pix_nome').value,
          cidade: document.getElementById('cfg_pix_cidade').value
        };
        localStorage.setItem('config_pix', JSON.stringify(config));
        alert('Configurações PIX salvas!');
      };

      function carregarTabelaPlanosConfig() {
        const planos = JSON.parse(localStorage.getItem('planos')) || [];
        const tbody = document.getElementById('tabelaConfigPlanos');
        tbody.innerHTML = '';
        planos.forEach(p => {
          const row = tbody.insertRow();
          row.innerHTML = `
            <td>${p.nome}</td>
            <td>R$ ${p.valor.toFixed(2).replace('.', ',')}</td>
            <td>
              <button onclick="editarPlanoConfig('${p.id}')" style="background:none; color:var(--primary); padding:0; margin-right:10px;" title="Editar">✏️</button>
              <button onclick="removerPlanoConfig('${p.id}')" style="background:none; color:#ff4444; padding:0;" title="Remover">🗑️</button>
            </td>
          `;
        });
      }

      window.editarPlanoConfig = (id) => {
        const planos = JSON.parse(localStorage.getItem('planos')) || [];
        const plano = planos.find(p => p.id == id);
        if (plano) {
          document.getElementById('plano_nome').value = plano.nome;
          document.getElementById('plano_valor').value = plano.valor.toFixed(2).replace('.', ',');
          editPlanoId = id;
          document.querySelector('#formPlano button[type="submit"]').innerText = '💾 Atualizar Plano';
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      };

      window.removerPlanoConfig = (id) => {
        let planos = JSON.parse(localStorage.getItem('planos')) || [];
        planos = planos.filter(p => p.id != id);
        localStorage.setItem('planos', JSON.stringify(planos));
        carregarTabelaPlanosConfig();
      };
    </script>
  </body>
</html>
