<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alunos - Sou Fitness</title>

    <link rel="stylesheet" href="Alunos.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">

        <header>
            <h1>Cadastro de Alunos</h1>
            <p>Gerenciamento completo dos alunos da academia</p>
        </header>

        <form id="formAluno">

            <div class="card">

                <h2>Dados Pessoais</h2>

                <div class="grid-2">
                    <div>
                        <label>Nome Completo</label>
                        <input type="text" id="nome" required>
                    </div>

                    <div>
                        <label>CPF</label>
                        <input type="text" id="cpf">
                    </div>
                </div>

                <div class="grid-3">
                    <div>
                        <label>Data de Nascimento</label>
                        <input type="date" id="nascimento">
                    </div>

                    <div>
                        <label>Sexo</label>
                        <select id="sexo">
                            <option>Masculino</option>
                            <option>Feminino</option>
                        </select>
                    </div>

                    <div>
                        <label>Estado Civil</label>
                        <select id="estadoCivil">
                            <option>Solteiro</option>
                            <option>Casado</option>
                            <option>Divorciado</option>
                        </select>
                    </div>
                </div>

            </div>

            <div class="card">

                <h2>Contato</h2>

                <div class="grid-3">

                    <div>
                        <label>Celular</label>
                        <input type="text" id="celular">
                    </div>

                    <div>
                        <label>WhatsApp</label>
                        <input type="text" id="whatsapp">
                    </div>

                    <div>
                        <label>E-mail</label>
                        <input type="email" id="email">
                    </div>

                </div>

            </div>

            <div class="card">

                <h2>Plano</h2>

                <div class="grid-4">

                    <div>
                        <label>Plano</label>
                        <select id="plano">
                            <option>Mensal</option>
                            <option>Trimestral</option>
                            <option>Semestral</option>
                            <option>Anual</option>
                        </select>
                    </div>

                    <div>
                        <label>Mensalidade</label>
                        <input type="number" id="valor">
                    </div>

                    <div>
                        <label>Vencimento</label>
                        <input type="number" min="1" max="31" id="vencimento">
                    </div>

                    <div>
                        <label>Status</label>
                        <select id="status">
                            <option>Ativo</option>
                            <option>Inativo</option>
                            <option>Bloqueado</option>
                        </select>
                    </div>

                </div>

            </div>

            <div class="card">

                <h2>Saúde</h2>

                <div class="grid-3">

                    <div>
                        <label>Peso (kg)</label>
                        <input type="number" id="peso">
                    </div>

                    <div>
                        <label>Altura (m)</label>
                        <input type="number" step="0.01" id="altura">
                    </div>

                    <div>
                        <label>IMC</label>
                        <input type="text" id="imc" readonly>
                    </div>

                </div>

            </div>

            <div class="botoes">
                <button type="submit" class="btn-salvar">
                    Salvar Aluno
                </button>

                <button type="reset" class="btn-limpar">
                    Limpar
                </button>
            </div>

        </form>

        <div class="card">

            <h2>Alunos Cadastrados</h2>

            <table>

                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Plano</th>
                        <th>Mensalidade</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody id="tabelaAlunos">

                </tbody>

            </table>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
